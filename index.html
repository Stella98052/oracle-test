:root{--bg:#09090f;--card:#12121e;--border:rgba(201,168,76,.22);--gold:#c9a84c;--gold2:#f0d080;--violet:#7c6fa0;--vl:#b0a8cc;--text:#e4ddf2;--dim:#8880a8;--green:#5dbf8a;--red:#e07070;}

body{font-family:'Noto Serif TC',serif;background:var(--bg);color:var(--text);min-height:100vh}
canvas#bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 0 60px}
#formPage{padding:20px 18px}
#reportPage{display:none}
.fh{text-align:center;padding:24px 0 16px}
.gl{font-size:2rem;display:block;animation:glow 3s ease-in-out infinite}

.fh h1{font-family:'Cinzel',serif;font-size:1.15rem;color:var(--gold);letter-spacing:.1em;margin:7px 0 3px}
.fh p{font-size:.69rem;color:var(--dim);letter-spacing:.1em}
.lang-row{display:flex;justify-content:center;margin:10px 0}
.lang-wrap{display:inline-flex;border:1px solid var(--border);border-radius:20px;overflow:hidden}
.lb{padding:5px 18px;font-size:.78rem;background:transparent;border:none;color:var(--dim);cursor:pointer;font-family:'Noto Serif TC',serif;transition:all .2s}
.lb.active{background:rgba(201,168,76,.2);color:var(--gold)}
.fc{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:17px 14px;margin-bottom:12px}
.fc-h2{font-size:.69rem;letter-spacing:.15em;color:var(--gold);margin-bottom:13px}
.fi{margin-bottom:11px}
.fi label{display:block;font-size:.7rem;color:var(--vl);margin-bottom:4px}
.fi input,.fi select{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:9px 12px;color:var(--text);font-size:.84rem;font-family:'Noto Serif TC',serif;-webkit-appearance:none;transition:border .2s}
.fi input:focus,.fi select:focus{outline:none;border-color:var(--gold)}
.fi select option{background:#1a1a2e}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.r3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:9px}
.btn-go{width:100%;padding:12px;border-radius:10px;background:linear-gradient(135deg,rgba(201,168,76,.25),rgba(124,111,160,.25));border:1px solid var(--gold);color:var(--gold);cursor:pointer;font-family:'Noto Serif TC',serif;font-size:.9rem;letter-spacing:.07em;transition:all .25s}
.btn-go:hover{background:linear-gradient(135deg,rgba(201,168,76,.4),rgba(124,111,160,.36))}
.err{color:var(--red);font-size:.74rem;margin-top:6px;min-height:18px;text-align:center}
.src-note{font-size:.65rem;color:var(--dim);text-align:center;margin-top:8px;line-height:1.5}
.src-note a{color:var(--gold);text-decoration:none}
.hero{background:linear-gradient(175deg,#0f1028 0%,#09091a 70%,var(--bg) 100%);padding:22px 16px 14px;text-align:center;border-bottom:1px solid var(--border);position:relative}
.hero-btns{position:absolute;top:11px;right:11px;display:flex;flex-direction:column;gap:5px;align-items:flex-end}
.hbtn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:7px;padding:4px 9px;color:var(--dim);font-size:.67rem;cursor:pointer;font-family:'Noto Serif TC',serif;white-space:nowrap;transition:all .2s}
.hbtn:hover{border-color:var(--gold);color:var(--gold)}
.ava{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--violet),var(--gold));display:flex;align-items:center;justify-content:center;font-size:1.35rem;margin:0 auto 9px;box-shadow:0 0 16px rgba(201,168,76,.28)}
.hero-name{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold2);margin-bottom:9px}
.tags{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:6px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:16px;font-size:.69rem;border:1px solid var(--border);background:rgba(201,168,76,.08);color:var(--gold2)}
.rsrc{font-size:.62rem;color:var(--dim);margin-top:4px}
.wyear{font-size:.69rem;color:var(--dim);padding:6px 0;text-align:center;background:var(--card)}
.wnav{display:flex;align-items:center;padding:10px 14px;background:var(--card);border-bottom:1px solid var(--border)}
.wnb{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:var(--dim);padding:5px 12px;border-radius:7px;cursor:pointer;font-size:.79rem;flex-shrink:0;transition:all .2s}
.wnb:hover{border-color:var(--gold);color:var(--gold)}
.wlbl{flex:1;text-align:center;font-size:.82rem;color:var(--gold2);padding:0 6px;line-height:1.4}
.sec{padding:13px 15px 0}
.slbl{font-size:.62rem;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:7px}
.slbl::after{content:'';flex:1;height:1px;background:var(--border)}
.tip-item{font-size:.77rem;color:var(--gold2);font-weight:700;line-height:1.5;margin-bottom:4px}
.lgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.lt{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center}
.llt{font-size:.59rem;color:var(--dim);margin-bottom:4px}
.llv{font-size:.77rem;color:var(--gold2);font-weight:700;line-height:1.35}
.agrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.atile{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 6px 10px;text-align:center;cursor:pointer;transition:all .2s}
.atile:hover{border-color:rgba(201,168,76,.5);transform:translateY(-2px)}
.drow{display:flex;align-items:center;gap:6px;padding:9px 11px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:6px}
.dr-d{font-size:.68rem;color:var(--dim);min-width:60px;flex-shrink:0}
.dr-moon{font-size:.68rem;color:var(--vl);min-width:46px;flex-shrink:0;letter-spacing:-.01em}
.dr-t{font-size:.76rem;color:var(--text);flex:1;line-height:1.42}
.dtag{font-size:.62rem;padding:2px 7px;border-radius:8px;border:1px solid;flex-shrink:0;white-space:nowrap}
.dtag.up{border-color:rgba(93,191,138,.4);color:var(--green)}
.dtag.mid{border-color:var(--border);color:var(--gold)}
.dtag.low{border-color:rgba(224,112,112,.3);color:var(--red)}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:100;align-items:flex-end;justify-content:center}

.msheet{background:#0e0e1c;border:1px solid var(--border);border-radius:16px 16px 0 0;padding:18px 16px 32px;width:100%;max-width:480px;max-height:76vh;overflow-y:auto}
.mhead{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.mclose{margin-left:auto;background:none;border:none;color:var(--dim);font-size:1.2rem;cursor:pointer}

.macts li:before{content:'▸';color:var(--gold);flex-shrink:0}
.macts li:last-child{border-bottom:none}

</head>

function openDetail(ai){if(!USER)return;var AREAS=LANG==='zh'?AREAS_ZH:AREAS_EN,TR=LANG==='zh'?TRENDS_ZH:TRENDS_EN;var wd=getWeeklyData(CWK,USER.sun);var rb=[USER.ris%12,(USER.ris+4)%12];var sc=wd.sc[ai];if(rb.indexOf(ai)>=0)sc=Math.min(5,sc+1);document.getElementById('dIco').textContent=AREAS_IC[ai];document.getElementById('dTitle').textContent=AREAS[ai];document.getElementById('dStars').innerHTML=stars(sc);document.getElementById('dTrend').textContent='☽ '+TR[ai][0];var li='';for(var i=0;i<TR[ai][1].length;i++)li+='<li>'+TR[ai][1][i]+'</li>';document.getElementById('dActs').innerHTML=li;document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function changeWeek(d){var dt=new Date(CWK);dt.setDate(dt.getDate()+d*7);CWK=getMon(dt);renderReport();}
function drawBg(){var c=document.getElementById('bg');if(!c)return;var ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;var g=ctx.createRadialGradient(c.width/2,0,0,c.width/2,c.height,c.height);g.addColorStop(0,'#0e0e22');g.addColorStop(1,'#06060e');ctx.fillStyle=g;ctx.fillRect(0,0,c.width,c.height);for(var i=0;i<200;i++){var x=Math.random()*c.width,y=Math.random()*c.height;ctx.beginPath();ctx.arc(x,y,Math.random()*1.2+.1,0,6.28);ctx.fillStyle='rgba(255,255,255,'+(Math.random()*.7+.1)+')';ctx.fill();}for(var j=0;j<10;j++){ctx.beginPath();ctx.arc(Math.random()*c.width,Math.random()*c.height,1.5,0,6.28);ctx.fillStyle='rgba(201,168,76,.55)';ctx.fill();}}
window.addEventListener('resize',drawBg);
window.onload=function(){drawBg();document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('active',b.dataset.l===LANG);});var saved=localStorage.getItem('oracle_u');if(saved){try{USER=JSON.parse(saved);document.getElementById('formPage').style.display='none';document.getElementById('reportPage').style.display='block';renderReport();}catch(e){localStorage.removeItem('oracle_u');renderForm();}}else{renderForm();}document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});};
