<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ 個人化占星週報 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Cinzel:wght@600;700&display=swap');
:root{--bg:#09090f;--card:#12121e;--border:rgba(201,168,76,.22);--gold:#c9a84c;--gold2:#f0d080;--violet:#7c6fa0;--vl:#b0a8cc;--text:#e4ddf2;--dim:#8880a8;--green:#5dbf8a;--red:#e07070;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Serif TC',serif;background:var(--bg);color:var(--text);min-height:100vh}
canvas#bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 0 60px}
#formPage{padding:20px 18px}
#reportPage{display:none}
.fh{text-align:center;padding:24px 0 16px}
.gl{font-size:2rem;display:block;animation:glow 3s ease-in-out infinite}
@keyframes glow{0%,100%{text-shadow:0 0 10px rgba(201,168,76,.3)}50%{text-shadow:0 0 28px rgba(201,168,76,.85)}}
.fh h1{font-family:'Cinzel',serif;font-size:1.15rem;color:var(--gold);letter-spacing:.1em;margin:7px 0 3px}
.fh p{font-size:.69rem;color:var(--dim);letter-spacing:.1em}
.lang-row{display:flex;justify-content:center;margin:10px 0}
.lang-wrap{display:inline-flex;border:1px solid var(--border);border-radius:20px;overflow:hidden}
.lb{padding:5px 18px;font-size:.78rem;background:transparent;border:none;color:var(--dim);cursor:pointer;font-family:'Noto Serif TC',serif;transition:all .2s}
.lb.active{background:rgba(201,168,76,.2);color:var(--gold)}
.fc{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:17px 14px;margin-bottom:12px}
.fc-h2{font-size:.69rem;letter-spacing:.15em;color:var(--gold);margin-bottom:13px}
.fi{margin-bottom:11px}
.fi label{display:block;font-size:.7rem;color:var(--vl);margin-bottom:4px}
.fi input,.fi select{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:9px 12px;color:var(--text);font-size:.84rem;font-family:'Noto Serif TC',serif;-webkit-appearance:none;transition:border .2s}
.fi input:focus,.fi select:focus{outline:none;border-color:var(--gold)}
.fi select option{background:#1a1a2e}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.r3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:9px}
.btn-go{width:100%;padding:12px;border-radius:10px;background:linear-gradient(135deg,rgba(201,168,76,.25),rgba(124,111,160,.25));border:1px solid var(--gold);color:var(--gold);cursor:pointer;font-family:'Noto Serif TC',serif;font-size:.9rem;letter-spacing:.07em;transition:all .25s}
.btn-go:hover{background:linear-gradient(135deg,rgba(201,168,76,.4),rgba(124,111,160,.36))}
.err{color:var(--red);font-size:.74rem;margin-top:6px;min-height:18px;text-align:center}
.src-note{font-size:.65rem;color:var(--dim);text-align:center;margin-top:8px;line-height:1.5}
.src-note a{color:var(--gold);text-decoration:none}
/* Hero */
.hero{background:linear-gradient(175deg,#0f1028 0%,#09091a 70%,var(--bg) 100%);padding:22px 16px 14px;text-align:center;border-bottom:1px solid var(--border);position:relative}
.hero-btns{position:absolute;top:11px;right:11px;display:flex;flex-direction:column;gap:5px;align-items:flex-end}
.hbtn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:7px;padding:4px 9px;color:var(--dim);font-size:.67rem;cursor:pointer;font-family:'Noto Serif TC',serif;white-space:nowrap;transition:all .2s}
.hbtn:hover{border-color:var(--gold);color:var(--gold)}
.ava{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--violet),var(--gold));display:flex;align-items:center;justify-content:center;font-size:1.35rem;margin:0 auto 9px;box-shadow:0 0 16px rgba(201,168,76,.28)}
.hero-name{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold2);margin-bottom:9px}
.tags{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:8px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:16px;font-size:.69rem;border:1px solid var(--border);background:rgba(201,168,76,.08);color:var(--gold2)}
.rsrc{font-size:.62rem;color:var(--dim);margin-top:4px}
/* Week nav */
.wyear{font-size:.69rem;color:var(--dim);padding:6px 0;text-align:center;background:var(--card)}
.wnav{display:flex;align-items:center;padding:10px 14px;background:var(--card);border-bottom:1px solid var(--border)}
.wnb{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:var(--dim);padding:5px 12px;border-radius:7px;cursor:pointer;font-size:.79rem;flex-shrink:0;transition:all .2s}
.wnb:hover{border-color:var(--gold);color:var(--gold)}
.wlbl{flex:1;text-align:center;font-size:.82rem;color:var(--gold2);padding:0 6px;line-height:1.4}
/* Sections */
.sec{padding:13px 15px 0}
.slbl{font-size:.62rem;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:7px}
.slbl::after{content:'';flex:1;height:1px;background:var(--border)}
.lgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.lt{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center}
.llt{font-size:.59rem;color:var(--dim);margin-bottom:4px}
.llv{font-size:.77rem;color:var(--gold2);font-weight:700;line-height:1.35}
.agrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.atile{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 6px 10px;text-align:center;cursor:pointer;transition:all .2s}
.atile:hover{border-color:rgba(201,168,76,.5);transform:translateY(-2px)}
/* Daily — updated layout */
.drow{display:flex;align-items:center;gap:6px;padding:9px 11px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:6px}
.dr-d{font-size:.68rem;color:var(--dim);min-width:52px;flex-shrink:0}
.dr-moon{font-size:.68rem;color:var(--vl);min-width:46px;flex-shrink:0;letter-spacing:-.01em}
.dr-t{font-size:.76rem;color:var(--text);flex:1;line-height:1.42}
.dtag{font-size:.62rem;padding:2px 7px;border-radius:8px;border:1px solid;flex-shrink:0;white-space:nowrap}
.dtag.up{border-color:rgba(93,191,138,.4);color:var(--green)}
.dtag.mid{border-color:var(--border);color:var(--gold)}
.dtag.low{border-color:rgba(224,112,112,.3);color:var(--red)}
/* Modal */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:100;align-items:flex-end;justify-content:center}
.modal.open{display:flex}
.msheet{background:#0e0e1c;border:1px solid var(--border);border-radius:16px 16px 0 0;padding:18px 16px 32px;width:100%;max-width:480px;max-height:76vh;overflow-y:auto}
.mhead{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.mclose{margin-left:auto;background:none;border:none;color:var(--dim);font-size:1.2rem;cursor:pointer}
.mtrend{background:rgba(124,111,160,.12);border-left:3px solid var(--violet);border-radius:0 7px 7px 0;padding:8px 11px;font-size:.8rem;color:var(--vl);line-height:1.72;margin-bottom:10px}
.macts{list-style:none}
.macts li{padding:6px 0;font-size:.82rem;color:var(--text);line-height:1.5;border-bottom:1px solid rgba(255,255,255,.05);display:flex;gap:7px}
.macts li:before{content:'▸';color:var(--gold);flex-shrink:0}
.macts li:last-child{border-bottom:none}
</style>
</head>

  <div class="err" id="errMsg"></div>
</div>

<!-- REPORT -->
<div id="reportPage">

    </div>
    <div class="ava" id="rAva">🌙</div>
    <div class="hero-name" id="rName"></div>
    <div class="tags" id="rTags"></div>
    <div class="rsrc" id="rSrc"></div>
    <div class="lang-row" style="margin-top:10px">
      <div class="lang-wrap">
        <button class="lb" data-l="zh" onclick="setLang('zh')">中文</button>
        <button class="lb" data-l="en" onclick="setLang('en')">English</button>
      </div>
    </div>
  </div>
  <div class="wyear" id="wYear"></div>
  <div class="wnav">

    <div class="wlbl" id="wLbl"></div>

</div>

</div>
<div class="modal" id="modal">
  <div class="msheet">
    <div class="mhead">
      <span style="font-size:1.35rem" id="dIco"></span>
      <span style="font-size:.92rem;color:var(--gold);font-weight:600" id="dTitle"></span>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div id="dStars" style="font-size:1rem;margin-bottom:10px"></div>
    <div class="mtrend" id="dTrend"></div>
    <ul class="macts" id="dActs"></ul>
  </div>
</div>

// ── Placidus Ascendant (astro.com compatible) ──
function calcAscendant(yr,mo,dy,hrL,miL,lat,lon,tz){
  var totMin=hrL*60+miL-Math.round(tz*60);
  var uh=Math.floor(totMin/60), um=totMin%60, ud=dy;
  if(uh<0){uh+=24;ud--;}if(uh>=24){uh-=24;ud++;}
  var a=Math.floor((14-mo)/12), y=yr+4800-a, m=mo+12*a-3;
  var JDN=ud+Math.floor((153*m+2)/5)+365*y+Math.floor(y/4)-Math.floor(y/100)+Math.floor(y/400)-32045;
  var JD=JDN+(uh-12)/24+um/1440;
  var T=(JD-2451545)/36525;
  var GMST=280.46061837+360.98564736629*(JD-2451545)+0.000387933*T*T-T*T*T/38710000;
  GMST=((GMST%360)+360)%360;
  var LST=((GMST+lon)%360+360)%360;
  var eps=23.439291111-0.013004167*T-0.000000164*T*T+0.000000504*T*T*T;
  var LSTr=LST*Math.PI/180, epsr=eps*Math.PI/180, latr=lat*Math.PI/180;
  var ASC=Math.atan2(-Math.cos(LSTr), Math.sin(epsr)*Math.tan(latr)+Math.cos(epsr)*Math.sin(LSTr))*180/Math.PI;
  ASC=((ASC%360)+360)%360;
  return{sign:Math.floor(ASC/30),deg:Math.round(ASC*10)/10};
}

// ── Moon sign (Meeus simplified) ──
function moonSign(yr,mo,dy){
  var a=Math.floor((14-mo)/12),y=yr+4800-a,m=mo+12*a-3;
  var JDN=dy+Math.floor((153*m+2)/5)+365*y+Math.floor(y/4)-Math.floor(y/100)+Math.floor(y/400)-32045;
  var d=(JDN-0.5)-2451545;
  var L=((218.316+13.176396*d)%360+360)%360;
  return{sign:Math.floor(L/30),deg:Math.round(L*10)/10};
}

// ── Sun sign ──
function getSunSign(mo,dy){
  var B=[[3,21,4,19],[4,20,5,20],[5,21,6,20],[6,21,7,22],[7,23,8,22],[8,23,9,22],[9,23,10,22],[10,23,11,21],[11,22,12,21],[12,22,1,19],[1,20,2,18],[2,19,3,20]];
  for(var i=0;i<12;i++){var b=B[i],sm=b[0],sd=b[1],em=b[2],ed=b[3];if(sm>em){if((mo===sm&&dy>=sd)||(mo===em&&dy<=ed))return i;}else{if((mo===sm&&dy>=sd)||(mo===em&&dy<=ed)||(mo>sm&&mo<em))return i;}}return 0;
}

function pad(n){return n<10?'0'+n:String(n);}

function addDays(wk,n){var d=new Date(wk);d.setDate(d.getDate()+n);return d;}
function getWN(wk){var d=new Date(wk),j=new Date(d.getFullYear(),0,1);return Math.ceil(((d-j)/86400000+j.getDay()+1)/7);}
function fmtRange(wk){

  return(m.getMonth()+1)+'/'+m.getDate()+' Mon — '+(su.getMonth()+1)+'/'+su.getDate()+' Sun';
}

// ── Weekly content generator ──
function weekHash(wk){var n=parseInt(wk.replace(/-/g,''));return((n*31+n%7*13)%1000+1000)%1000;}
function getWeeklyData(wk,sun,risCSS){
  var wn=getWN(wk),h=weekHash(wk),pat=WEEK_PATTERNS[wn%4];
  var sc=[];for(var ai=0;ai<9;ai++){var base=BASE_SCORES[ai][sun],delta=(h+ai*7)%3-1;sc.push(Math.max(1,Math.min(5,base+pat[ai]+delta)));}

  var dayArr=LANG==='zh'?LUCKY_DAY_ZH:LUCKY_DAY_EN;

  var col=LANG==='zh'?colZH:colEN, day=dayArr[(sun+off)%12], kw=kwArr[(sun+off)%12];
  // daily — with moon sign
  var daily=[];var monDt=new Date(wk);
  var dayNamesZH=['（一）','（二）','（三）','（四）','（五）','（六）','（日）'];
  var dayNamesEN=[' Mon',' Tue',' Wed',' Thu',' Fri',' Sat',' Sun'];
  for(var di=0;di<7;di++){
    var dt=addDays(wk,di);
    var yr=dt.getFullYear(),mo=dt.getMonth()+1,dy=dt.getDate();
    var ms=moonSign(yr,mo,dy);
    var dName=(mo)+'/'+dy+(LANG==='zh'?dayNamesZH[di]:dayNamesEN[di]);
    var seed=(h+di*17+sun*3)%10;
    var moodRow=(wn+di)%2, moodIdx=(h+di)%8;
    var tagArr=LANG==='zh'?DAILY_TAGS_ZH[moodRow]:DAILY_TAGS_EN[moodRow];
    var moonLbl=LANG==='zh'?MOON_ZH[ms.sign]:MOON_EN[ms.sign];
    var sign_em=['♈','♉','♊','♋','♌','♍','♎','♏','♐','♑','♒','♓'];
    daily.push({d:dName,m:DAILY_MOODS[moodRow][moodIdx],t:LANG==='zh'?DAILY_TEXT_ZH[seed]:DAILY_TEXT_EN[seed],tag:tagArr[moodIdx%tagArr.length],cls:DAILY_CLS[seed],moon:sign_em[ms.sign]+' '+moonLbl,colCSS:colCSS});
  }
  return{sc:sc,col:col,colCSS:colCSS,day:day,kw:kw,daily:daily};
}

    var d=wd.daily[di];
    dh+='<div class="drow">'+
        '<div class="dr-d">'+d.d+'</div>'+
        '<span style="width:9px;height:9px;border-radius:50%;background:'+d.colCSS+';flex-shrink:0;display:inline-block;margin:0 2px"></span>'+
        '<div class="dr-moon">'+d.moon+'</div>'+
        '<div class="dr-t">'+d.t+'</div>'+
        '<span class="dtag '+d.cls+'">'+d.tag+'</span></div>';
  }
  document.getElementById('dailyList').innerHTML=dh;
  document.getElementById('sl1').textContent=f.sl[0];
  document.getElementById('sl2').textContent=f.sl[1];
  document.getElementById('sl3').textContent=f.sl[2];
}

function openDetail(ai){
  if(!USER)return;
  var f=FL[LANG],AREAS=LANG==='zh'?AREAS_ZH:AREAS_EN,TRENDS=LANG==='zh'?TRENDS_ZH:TRENDS_EN;
  var wd=getWeeklyData(CWK,USER.sun);
  var sc=wd.sc[ai];var rb=[USER.ris%9,(USER.ris+4)%9];if(rb.indexOf(ai)>=0)sc=Math.min(5,sc+1);
  document.getElementById('dIco').textContent=AREAS_IC[ai];
  document.getElementById('dTitle').textContent=AREAS[ai];
  document.getElementById('dStars').innerHTML=stars(sc);
  document.getElementById('dTrend').textContent='☽ '+TRENDS[ai][0];
  var ah='';TRENDS[ai][1].forEach(function(a){ah+='<li>'+a+'</li>';});
  document.getElementById('dActs').innerHTML=ah;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function changeWeek(d){var dt=new Date(CWK);dt.setDate(dt.getDate()+d*7);CWK=getMon(dt);renderReport();}

function drawBg(){
  var c=document.getElementById('bg');if(!c)return;
  var ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;
  var g=ctx.createRadialGradient(c.width/2,0,0,c.width/2,c.height,c.height);
  g.addColorStop(0,'#0e0e22');g.addColorStop(1,'#06060e');
  ctx.fillStyle=g;ctx.fillRect(0,0,c.width,c.height);
  for(var i=0;i<200;i++){var x=Math.random()*c.width,y=Math.random()*c.height;ctx.beginPath();ctx.arc(x,y,Math.random()*1.2+.1,0,6.28);ctx.fillStyle='rgba(255,255,255,'+(Math.random()*.7+.1)+')';ctx.fill();}
  for(var i=0;i<10;i++){ctx.beginPath();ctx.arc(Math.random()*c.width,Math.random()*c.height,1.5,0,6.28);ctx.fillStyle='rgba(201,168,76,.55)';ctx.fill();}
}
window.addEventListener('resize',drawBg);

window.onload=function(){
  drawBg();
  document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('active',b.dataset.l===LANG);});
  var saved=localStorage.getItem('ol_u');
  if(saved){try{USER=JSON.parse(saved);if(!USER.risDeg)USER.risDeg='—';document.getElementById('formPage').style.display='none';document.getElementById('reportPage').style.display='block';renderReport();}catch(e){localStorage.removeItem('ol_u');renderForm();}}else{renderForm();}
  document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
};
</script>
