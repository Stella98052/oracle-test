<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ 個人化占星週報</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Cinzel:wght@600;700&display=swap');
:root{--bg:#09090f;--card:#12121e;--border:rgba(201,168,76,.22);--gold:#c9a84c;--gold2:#f0d080;--violet:#7c6fa0;--vl:#b0a8cc;--text:#e4ddf2;--dim:#8880a8;--green:#5dbf8a;--red:#e07070;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Serif TC',serif;background:var(--bg);color:var(--text);min-height:100vh}
canvas#bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 0 60px}
#formPage{padding:20px 18px}
#reportPage{display:none}
.fh{text-align:center;padding:26px 0 18px}
.gl{font-size:2.2rem;display:block;animation:glow 3s ease-in-out infinite}
@keyframes glow{0%,100%{text-shadow:0 0 10px rgba(201,168,76,.3)}50%{text-shadow:0 0 28px rgba(201,168,76,.85)}}
.fh h1{font-family:'Cinzel',serif;font-size:1.2rem;color:var(--gold);letter-spacing:.1em;margin:8px 0 4px}
.fh p{font-size:.7rem;color:var(--dim);letter-spacing:.1em}
.lang-row{display:flex;justify-content:center;margin:10px 0}
.lang-wrap{display:inline-flex;border:1px solid var(--border);border-radius:20px;overflow:hidden}
.lb{padding:5px 18px;font-size:.78rem;background:transparent;border:none;color:var(--dim);cursor:pointer;font-family:'Noto Serif TC',serif;transition:all .2s}
.lb.active{background:rgba(201,168,76,.2);color:var(--gold)}
.fc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 15px;margin-bottom:13px}
.fc-h2{font-size:.7rem;letter-spacing:.16em;color:var(--gold);margin-bottom:13px;text-transform:uppercase}
.fi{margin-bottom:12px}
.fi label{display:block;font-size:.71rem;color:var(--vl);margin-bottom:4px}
.fi input,.fi select{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:10px 12px;color:var(--text);font-size:.85rem;font-family:'Noto Serif TC',serif;-webkit-appearance:none;transition:border .2s}
.fi input:focus,.fi select:focus{outline:none;border-color:var(--gold)}
.fi select option{background:#1a1a2e}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-go{width:100%;padding:13px;border-radius:11px;background:linear-gradient(135deg,rgba(201,168,76,.25),rgba(124,111,160,.25));border:1px solid var(--gold);color:var(--gold);cursor:pointer;font-family:'Noto Serif TC',serif;font-size:.92rem;letter-spacing:.07em;transition:all .25s}
.btn-go:hover{background:linear-gradient(135deg,rgba(201,168,76,.42),rgba(124,111,160,.38))}
.err{color:var(--red);font-size:.75rem;margin-top:6px;min-height:18px;text-align:center}
/* Hero */
.hero{background:linear-gradient(175deg,#0f1028 0%,#09091a 70%,var(--bg) 100%);padding:24px 18px 16px;text-align:center;border-bottom:1px solid var(--border);position:relative}
.hero-btns{position:absolute;top:12px;right:12px;display:flex;flex-direction:column;gap:6px;align-items:flex-end}
.hbtn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:4px 10px;color:var(--dim);font-size:.68rem;cursor:pointer;font-family:'Noto Serif TC',serif;white-space:nowrap;transition:all .2s}
.hbtn:hover{border-color:var(--gold);color:var(--gold)}
.ava{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--violet),var(--gold));display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin:0 auto 10px;box-shadow:0 0 18px rgba(201,168,76,.28)}
.hero-name{font-family:'Cinzel',serif;font-size:1.05rem;color:var(--gold2);margin-bottom:10px}
.tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:10px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:4px 11px;border-radius:18px;font-size:.71rem;border:1px solid var(--border);background:rgba(201,168,76,.08);color:var(--gold2)}
/* Week nav — FIX #2: compact, date + W in one row */
.wnav{display:flex;align-items:center;gap:0;padding:12px 16px 0;background:var(--card);border-bottom:1px solid var(--border)}
.wyear{font-size:.7rem;color:var(--dim);padding:8px 0;text-align:center;background:var(--card)}
.wnb{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:var(--dim);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.8rem;flex-shrink:0;transition:all .2s}
.wnb:hover{border-color:var(--gold);color:var(--gold)}
.wlbl{flex:1;text-align:center;font-size:.83rem;color:var(--gold2);padding:0 8px;line-height:1.4}
/* Sections */
.sec{padding:14px 16px 0}
.slbl{font-size:.63rem;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.slbl::after{content:'';flex:1;height:1px;background:var(--border)}
.lgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.lt{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px 7px;text-align:center}
.llt{font-size:.6rem;color:var(--dim);margin-bottom:4px}
.llv{font-size:.79rem;color:var(--gold2);font-weight:700;line-height:1.35}
.agrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.atile{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px 7px 11px;text-align:center;cursor:pointer;transition:all .2s}
.atile:hover{border-color:rgba(201,168,76,.5);transform:translateY(-2px)}
.drow{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:11px;margin-bottom:7px}
.dr-d{font-size:.7rem;color:var(--dim);min-width:60px}
.dr-m{font-size:.9rem}
.dr-t{font-size:.78rem;color:var(--text);flex:1;line-height:1.45}
.dtag{font-size:.63rem;padding:2px 7px;border-radius:9px;border:1px solid;flex-shrink:0;white-space:nowrap}
.dtag.up{border-color:rgba(93,191,138,.4);color:var(--green)}
.dtag.mid{border-color:var(--border);color:var(--gold)}
.dtag.low{border-color:rgba(224,112,112,.3);color:var(--red)}
/* Modal */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:100;align-items:flex-end;justify-content:center}
.modal.open{display:flex}
.msheet{background:#0e0e1c;border:1px solid var(--border);border-radius:18px 18px 0 0;padding:20px 18px 34px;width:100%;max-width:480px;max-height:76vh;overflow-y:auto}
.mhead{display:flex;align-items:center;gap:9px;margin-bottom:11px}
.mclose{margin-left:auto;background:none;border:none;color:var(--dim);font-size:1.25rem;cursor:pointer}
.mtrend{background:rgba(124,111,160,.12);border-left:3px solid var(--violet);border-radius:0 7px 7px 0;padding:9px 12px;font-size:.81rem;color:var(--vl);line-height:1.72;margin-bottom:11px}
.macts{list-style:none}
.macts li{padding:6px 0;font-size:.83rem;color:var(--text);line-height:1.5;border-bottom:1px solid rgba(255,255,255,.05);display:flex;gap:7px}
.macts li:before{content:'▸';color:var(--gold);flex-shrink:0}
.macts li:last-child{border-bottom:none}
</style>
</head>

<canvas id="bg"></canvas>
<div class="wrap">

<!-- FORM -->
<div id="formPage">

    <div class="r2">

    </div>

      <div class="fi"><label id="lbl-gender">性別</label>
        <select id="f-gender"><option value="F">女 Female</option><option value="M">男 Male</option><option value="N">不指定</option></select>
      </div>
    </div>
    <div class="fi"><label id="lbl-lat">出生地緯度（選填）</label><input type="number" id="f-lat" placeholder="例：25.04（台北）" step="0.01" min="-90" max="90"></div>
  </div>
  <button class="btn-go" id="btn-go" onclick="generateReport()">✦ 產生我的個人化週報</button>
  <div class="err" id="errMsg"></div>

<!-- REPORT -->
<div id="reportPage">

    </div>
    <div class="ava" id="rAva">🌙</div>
    <div class="hero-name" id="rName"></div>
    <div class="tags" id="rTags"></div>
    <div class="lang-row">
      <div class="lang-wrap">
        <button class="lb" data-l="zh" onclick="setLang('zh')">中文</button>
        <button class="lb" data-l="en" onclick="setLang('en')">English</button>
      </div>
    </div>
  </div>
  <div class="wyear" id="wYear"></div>
  <div class="wnav">
    <button class="wnb" onclick="changeWeek(-1)">◀</button>
    <div class="wlbl" id="wLbl"></div>
    <button class="wnb" onclick="changeWeek(1)">▶</button>
  </div>
  <div class="sec"><div class="slbl" id="sl1">✨ 本週幸運元素</div><div class="lgrid" id="luckyGrid"></div></div>
  <div class="sec" style="margin-top:16px"><div class="slbl" id="sl2">📊 九大領域週運</div><div class="agrid" id="areasGrid"></div></div>
  <div class="sec" style="margin-top:16px"><div class="slbl" id="sl3">📅 每日運勢</div><div id="dailyList"></div></div>
</div>

</div>
<!-- MODAL -->
<div class="modal" id="modal">
  <div class="msheet">
    <div class="mhead">
      <span style="font-size:1.4rem" id="dIco"></span>
      <span style="font-size:.94rem;color:var(--gold);font-weight:600" id="dTitle"></span>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div id="dStars" style="font-size:1.05rem;margin-bottom:11px"></div>

    <ul class="macts" id="dActs"></ul>

var TRENDS_EN=[["Key planetary energy this week boosts career momentum. Now is the time to prepare and take initiative.", ["Clarify your key strengths and elevator pitch", "Identify 3\u20135 target opportunities", "Reach out to key contacts", "Set career intentions by week's end"]], ["Mercury active \u2014 mental clarity peaks. Study efficiency is high; great for exams and deep thinking.", ["Study at least 1 hour daily", "Review and organize notes", "Set next-phase learning goals", "Use planetary energy for a fresh academic start"]], ["Financial energy stabilizes this week. Focus on budgeting and long-term planning; avoid impulse spending.", ["Audit this month's income and expenses", "Set a spending ceiling for major items", "Check upcoming bill deadlines", "Assess your cash-flow plan"]], ["Venus or Jupiter transiting \u2014 social doors open. Express yourself in relationships and build new connections.", ["Reach out to someone important", "Express your needs and feelings clearly", "Make a relationship wish this weekend", "Notice new people entering your life"]], ["Jupiter in Cancer deepens family bonds. Moon in the 4th house amplifies nurturing energy.", ["Schedule quality family time", "Check in on family members' wellbeing", "Tidy and refresh your living space", "Mind subtle communication dynamics at home"]], ["Watch your energy levels \u2014 fluctuations are likely. Prioritize rest, hydration, and regular routines.", ["Maintain consistent sleep hours", "Eat more fruits and vegetables", "30 min gentle exercise daily", "Consider scheduling a health checkup"]], ["Travel fortune is positive this week. Confirm tickets and itinerary details; allow buffer time.", ["Confirm upcoming travel bookings", "Prepare a backup route", "Check destination entry requirements", "Set a firm travel budget"]], ["Spiritual energy is strong. Meditation, journaling, and intention-setting resonate deeply now.", ["10\u201315 min daily sitting or recitation", "Write your intentions", "Journal recent insights", "Release one old habit"]], ["Altruistic energy peaks this week. Community service and volunteer work bring deep fulfillment.", ["Confirm training date and preparations", "Complete one act of kindness", "Reach out to someone who needs support", "Set a service intention"]]];
</script>
<script>
window.onerror=function(m,s,l){var e=document.getElementById('errMsg');if(e)e.textContent='Error('+l+'): '+m;return true;};

// ── Lang ──
var LANG=localStorage.getItem('ol_lang')||(navigator.language.startsWith('zh')?'zh':'en');
function setLang(l){
  LANG=l;localStorage.setItem('ol_lang',l);
  document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('active',b.dataset.l===l);});
  if(USER){renderReport();}else{renderForm();}
}

// ── Astro helpers ──
function getSunSign(mo,dy){
  var B=[[3,21,4,19],[4,20,5,20],[5,21,6,20],[6,21,7,22],[7,23,8,22],[8,23,9,22],[9,23,10,22],[10,23,11,21],[11,22,12,21],[12,22,1,19],[1,20,2,18],[2,19,3,20]];
  for(var i=0;i<12;i++){var b=B[i],sm=b[0],sd=b[1],em=b[2],ed=b[3];if(sm>em){if((mo===sm&&dy>=sd)||(mo===em&&dy<=ed))return i;}else{if((mo===sm&&dy>=sd)||(mo===em&&dy<=ed)||(mo>sm&&mo<em))return i;}}
  return 0;
}
function getRising(hr,mi,sun){return(sun+Math.floor(((hr+mi/60-6+24)%24)/2))%12;}
function getNum(s){var n=s.replace(/-/g,'').split('').reduce(function(a,b){return a+parseInt(b);},0);while(n>9&&n!==11&&n!==22)n=String(n).split('').reduce(function(a,b){return a+parseInt(b);},0);return n;}

// ── Date helpers (local) ──
function pad(n){return n<10?'0'+n:String(n);}
function getMon(d){var dt=new Date(d),day=dt.getDay();dt.setDate(dt.getDate()+(day===0?-6:1-day));return dt.getFullYear()+'-'+pad(dt.getMonth()+1)+'-'+pad(dt.getDate());}
function addDays(wk,n){var d=new Date(wk);d.setDate(d.getDate()+n);return d;}
function getWN(wk){var d=new Date(wk),j=new Date(d.getFullYear(),0,1);return Math.ceil(((d-j)/86400000+j.getDay()+1)/7);}
function fmtDate(d,zh){if(zh)return(d.getMonth()+1)+'/'+d.getDate();return(d.getMonth()+1)+'/'+d.getDate();}
function fmtRange(wk){
  var m=new Date(wk),su=addDays(wk,6);
  if(LANG==='zh')return(m.getMonth()+1)+'/'+m.getDate()+'（一）— '+(su.getMonth()+1)+'/'+su.getDate()+'（日）';
  return(m.getMonth()+1)+'/'+m.getDate()+' Mon — '+(su.getMonth()+1)+'/'+su.getDate()+' Sun';
}
function getDayNames(wk){
  var zh=['（一）','（二）','（三）','（四）','（五）','（六）','（日）'];
  var en=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  var res=[];
  for(var i=0;i<7;i++){var d=addDays(wk,i);var mo=d.getMonth()+1,dy=d.getDate();res.push(mo+'/'+dy+(LANG==='zh'?zh[i]:' '+en[i]));}
  return res;
}

// ── Weekly content generator (dynamic per week) ──
function weekHash(wk){
  var n=parseInt(wk.replace(/-/g,''));
  return(n*31+n%7*13)%1000;
}
function getWeeklyData(wk,sun){
  var wn=getWN(wk), h=weekHash(wk);
  var pat=WEEK_PATTERNS[wn%4];
  // Scores
  var sc=[];
  for(var ai=0;ai<9;ai++){var base=BASE_SCORES[ai][sun],delta=(h+ai*7)%3-1;sc.push(Math.max(1,Math.min(5,base+pat[ai]+delta)));}
  // Lucky (offset by week)
  var off=(wn+Math.floor(sun/3))%12;
  var colArr=LANG==='zh'?LUCKY_COL_ZH:LUCKY_COL_EN;
  var dayArr=LANG==='zh'?LUCKY_DAY_ZH:LUCKY_DAY_EN;
  var kwArr =LANG==='zh'?LUCKY_KW_ZH:LUCKY_KW_EN;
  var col=colArr[(sun+off)%12], day=dayArr[(sun+off)%12], kw=kwArr[(sun+off)%12];
  var num=NUMS_MAP[getNum]||[1,4]; // placeholder, computed separately
  // Daily
  var days=getDayNames(wk), dailyArr=[];
  for(var di=0;di<7;di++){
    var seed=(h+di*17+sun*3)%10;
    var moodRow=(wn+di)%2, moodIdx=(h+di)%8;
    var tagArr=LANG==='zh'?DAILY_TAGS_ZH[moodRow]:DAILY_TAGS_EN[moodRow];
    var txtArr=LANG==='zh'?DAILY_TEXT_ZH:DAILY_TEXT_EN;
    dailyArr.push({d:days[di],m:DAILY_MOODS[moodRow][moodIdx],t:txtArr[seed],tag:tagArr[moodIdx%tagArr.length],cls:DAILY_CLS[seed]});
  }
  // Moon phase label for week title
  var moonIdx=Math.floor((wn*7/29.5)%8);
  var moonLbl=LANG==='zh'?MOON_ZH[moonIdx]:MOON_EN[moonIdx];
  return{sc:sc,col:col,day:day,kw:kw,daily:dailyArr,moon:moonLbl,pat:wn%4};
}

// ── Stars HTML ──
function stars(n){var s='';for(var i=0;i<5;i++)s+='<span style="color:'+(i<n?'#c9a84c':'rgba(255,255,255,.15)')+'">★</span>';return s;}

// ── State ──
var USER=null, CWK=getMon(new Date());

// ── Bilingual form strings ──
var FL={
  zh:{h2:'☽ 輸入出生資料',name:'姓名',date:'出生日期',time:'出生時間',city:'出生城市',gender:'性別',lat:'出生地緯度（選填，提升上升座精準度）',ph_name:'你的名字',ph_city:'例：台北',ph_lat:'例：25.04（台北）',gF:'女 Female',gM:'男 Male',gN:'不指定',btn:'✦ 產生我的個人化週報',req:'請填寫出生日期',sl:['✨ 本週幸運元素','📊 九大領域週運','📅 每日運勢'],ll:['幸運色','幸運數字','幸運日','關鍵詞'],edit:'✎ 編輯資料',save:'💾 儲存週報'},
  en:{h2:'☽ Enter Birth Data',name:'Name',date:'Birth Date',time:'Birth Time',city:'Birth City',gender:'Gender',lat:'Latitude (optional, improves rising sign)',ph_name:'Your name',ph_city:'e.g. Taipei',ph_lat:'e.g. 25.04 (Taipei)',gF:'Female',gM:'Male',gN:'Other',btn:'✦ Generate My Weekly Report',req:'Please enter your birth date',sl:['✨ Lucky Elements','📊 9-Area Forecast','📅 Daily Outlook'],ll:['Lucky Color','Lucky No.','Lucky Day','Keyword'],edit:'✎ Edit',save:'💾 Save Report'}
};

function renderForm(){
  var f=FL[LANG];
  document.getElementById('form-h2').textContent=f.h2;
  document.getElementById('lbl-name').textContent=f.name;
  document.getElementById('lbl-date').textContent=f.date;
  document.getElementById('lbl-time').textContent=f.time;
  document.getElementById('lbl-city').textContent=f.city;
  document.getElementById('lbl-gender').textContent=f.gender;
  document.getElementById('lbl-lat').textContent=f.lat;
  document.getElementById('f-name').placeholder=f.ph_name;
  document.getElementById('f-city').placeholder=f.ph_city;
  document.getElementById('f-lat').placeholder=f.ph_lat;
  var fg=document.getElementById('f-gender');
  if(fg){fg.options[0].text=f.gF;fg.options[1].text=f.gM;fg.options[2].text=f.gN;}
  document.getElementById('btn-go').textContent=f.btn;
}

// ── Generate ──
function generateReport(){
  document.getElementById('errMsg').textContent='';
  var dv=document.getElementById('f-date').value;
  if(!dv){document.getElementById('errMsg').textContent=FL[LANG].req;return;}
  var name=(document.getElementById('f-name').value.trim())||(LANG==='zh'?'旅行者':'Traveler');
  var tv=document.getElementById('f-time').value||'08:00';
  var city=(document.getElementById('f-city').value.trim())||(LANG==='zh'?'未指定':'Unknown');
  var parts=dv.split('-'),y=parseInt(parts[0]),mo=parseInt(parts[1]),dy=parseInt(parts[2]);
  var tp=tv.split(':'),hr=parseInt(tp[0]),mi=parseInt(tp[1]);
  var sun=getSunSign(mo,dy),ris=getRising(hr,mi,sun),num=getNum(dv);
  USER={name:name,dv:dv,tv:tv,city:city,sun:sun,ris:ris,num:num,y:y};
  localStorage.setItem('ol_u',JSON.stringify(USER));
  document.getElementById('formPage').style.display='none';
  document.getElementById('reportPage').style.display='block';
  renderReport();
}

function goEdit(){
  document.getElementById('reportPage').style.display='none';
  document.getElementById('formPage').style.display='block';
  if(USER){document.getElementById('f-name').value=USER.name||'';document.getElementById('f-date').value=USER.dv||'';document.getElementById('f-time').value=USER.tv||'';document.getElementById('f-city').value=USER.city||'';}
  renderForm();
}

// ── Save report as text ──
function saveReport(){
  var f=FL[LANG], SIGNS=LANG==='zh'?SIGNS_ZH:SIGNS_EN;
  var wn=getWN(CWK), wd=getWeeklyData(CWK,USER.sun);
  var nums=NUMS_MAP[USER.num]||[USER.num,1];
  var lines=[
    (LANG==='zh'?'【個人化占星週報】':'[Personal Astrology Report]'),
    USER.name+' | W'+wn+' '+fmtRange(CWK),
    (LANG==='zh'?'太陽：':'Sun: ')+SIGNS[USER.sun]+(LANG==='zh'?'座  上升：':'  Rising: ')+SIGNS[USER.ris]+(LANG==='zh'?'座':''),
    '',
    f.ll[0]+': '+wd.col+'  '+f.ll[1]+': '+nums.join('·')+'  '+f.ll[2]+': '+wd.day+'  '+f.ll[3]+': '+wd.kw,
    ''
  ];
  var AREAS=LANG==='zh'?AREAS_ZH:AREAS_EN;
  for(var ai=0;ai<9;ai++){var sc=wd.sc[ai];var st='';for(var j=0;j<sc;j++)st+='★';for(var j=sc;j<5;j++)st+='☆';lines.push(AREAS_IC[ai]+' '+AREAS[ai]+' '+st);}
  lines.push('');
  var TRENDS=LANG==='zh'?TRENDS_ZH:TRENDS_EN;
  for(var ai=0;ai<9;ai++){lines.push('['+AREAS[ai]+'] '+TRENDS[ai][0]);TRENDS[ai][1].forEach(function(a){lines.push('  ▸ '+a);});lines.push('');}
  for(var di=0;di<wd.daily.length;di++){var d=wd.daily[di];lines.push(d.d+' '+d.m+' '+d.t+' ['+d.tag+']');}
  var blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='oracle_W'+wn+'_'+USER.name+'.txt';a.click();
}

// ── Render ──
function renderReport(){
  if(!USER)return;
  var f=FL[LANG], sun=USER.sun, ris=USER.ris;
  var SIGNS=LANG==='zh'?SIGNS_ZH:SIGNS_EN;
  var AREAS=LANG==='zh'?AREAS_ZH:AREAS_EN;
  var wn=getWN(CWK);
  var wd=getWeeklyData(CWK,sun);
  var nums=NUMS_MAP[USER.num]||[USER.num,1];

  // Update lang buttons
  document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('active',b.dataset.l===LANG);});

  // Hero
  document.getElementById('rAva').textContent=SIGN_EM[sun];
  document.getElementById('rName').textContent=USER.name+(LANG==='zh'?' 的個人化週運':'— Personal Weekly');
  document.getElementById('rTags').innerHTML=
    '<span class="tag">☀️ '+(LANG==='zh'?'太陽 ':'')+SIGNS[sun]+(LANG==='zh'?'座':'')+'</span>'+
    '<span class="tag">↑ '+(LANG==='zh'?'上升 ':'')+SIGNS[ris]+(LANG==='zh'?'座':'')+'</span>'+
    '<span class="tag">🎂 '+USER.dv.replace(/-/g,'/')+'</span>'+
    '<span class="tag">📍 '+USER.city+'</span>';
  document.getElementById('edit-btn').textContent=f.edit;
  document.getElementById('save-btn').textContent=f.save;

  // Week nav — FIX #2: W number + date range in one line
  document.getElementById('wLbl').textContent='W'+wn+' · '+fmtRange(CWK);
  document.getElementById('wYear').textContent=new Date(CWK).getFullYear()+(LANG==='zh'?'年':'');

  // Lucky — FIX #3: uses wd which is week-dependent
  document.getElementById('luckyGrid').innerHTML=
    '<div class="lt"><div class="llt">'+f.ll[0]+'</div><div class="llv">'+wd.col+'</div></div>'+
    '<div class="lt"><div class="llt">'+f.ll[1]+'</div><div class="llv">'+nums.join('·')+'</div></div>'+
    '<div class="lt"><div class="llt">'+f.ll[2]+'</div><div class="llv">'+wd.day+'</div></div>'+
    '<div class="lt"><div class="llt">'+f.ll[3]+'</div><div class="llv">'+wd.kw+'</div></div>';

  // Areas — FIX #3: uses wd.sc which is week-dependent
  var rb=[ris%9,(ris+4)%9],ah='';
  for(var ai=0;ai<9;ai++){
    var sc=wd.sc[ai];if(rb.indexOf(ai)>=0)sc=Math.min(5,sc+1);
    ah+='<div class="atile" onclick="openDetail('+ai+')"><div style="font-size:1.4rem;margin-bottom:5px">'+AREAS_IC[ai]+'</div><div style="font-size:.68rem;color:var(--dim);margin-bottom:5px">'+AREAS[ai]+'</div><div>'+stars(sc)+'</div></div>';
  }
  document.getElementById('areasGrid').innerHTML=ah;

  // Daily — FIX #3: uses wd.daily which is week-dependent
  var dh='';
  for(var di=0;di<wd.daily.length;di++){
    var d=wd.daily[di];
    dh+='<div class="drow"><div class="dr-d">'+d.d+'</div><div class="dr-m">'+d.m+'</div><div class="dr-t">'+d.t+'</div><span class="dtag '+d.cls+'">'+d.tag+'</span></div>';
  }
  document.getElementById('dailyList').innerHTML=dh;

  // Section labels
  document.getElementById('sl1').textContent=f.sl[0];
  document.getElementById('sl2').textContent=f.sl[1];
  document.getElementById('sl3').textContent=f.sl[2];
}

// ── Detail modal ──
function openDetail(ai){
  if(!USER)return;
  var f=FL[LANG], AREAS=LANG==='zh'?AREAS_ZH:AREAS_EN, TRENDS=LANG==='zh'?TRENDS_ZH:TRENDS_EN;
  var wd=getWeeklyData(CWK,USER.sun);
  var sc=wd.sc[ai]; var rb=[USER.ris%9,(USER.ris+4)%9]; if(rb.indexOf(ai)>=0)sc=Math.min(5,sc+1);
  document.getElementById('dIco').textContent=AREAS_IC[ai];
  document.getElementById('dTitle').textContent=AREAS[ai];
  document.getElementById('dStars').innerHTML=stars(sc);
  document.getElementById('dTrend').textContent='☽ '+TRENDS[ai][0];
  var ah='';TRENDS[ai][1].forEach(function(a){ah+='<li>'+a+'</li>';});
  document.getElementById('dActs').innerHTML=ah;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}

// ── Week nav ──
function changeWeek(d){var dt=new Date(CWK);dt.setDate(dt.getDate()+d*7);CWK=getMon(dt);renderReport();}

// ── Starfield ──
function drawBg(){
  var c=document.getElementById('bg'); if(!c)return;
  var ctx=c.getContext('2d'); c.width=window.innerWidth; c.height=window.innerHeight;
  var g=ctx.createRadialGradient(c.width/2,0,0,c.width/2,c.height,c.height);
  g.addColorStop(0,'#0e0e22');g.addColorStop(1,'#06060e');
  ctx.fillStyle=g;ctx.fillRect(0,0,c.width,c.height);
  for(var i=0;i<200;i++){var x=Math.random()*c.width,y=Math.random()*c.height;ctx.beginPath();ctx.arc(x,y,Math.random()*1.2+.1,0,6.28);ctx.fillStyle='rgba(255,255,255,'+(Math.random()*.7+.1)+')';ctx.fill();}
  for(var i=0;i<10;i++){ctx.beginPath();ctx.arc(Math.random()*c.width,Math.random()*c.height,1.5,0,6.28);ctx.fillStyle='rgba(201,168,76,.55)';ctx.fill();}
}
window.addEventListener('resize',drawBg);

// ── Init ──
window.onload=function(){
  drawBg();
  document.querySelectorAll('.lb').forEach(function(b){b.classList.toggle('active',b.dataset.l===LANG);});
  var saved=localStorage.getItem('ol_u');
  if(saved){
    try{USER=JSON.parse(saved);document.getElementById('formPage').style.display='none';document.getElementById('reportPage').style.display='block';renderReport();}
    catch(e){localStorage.removeItem('ol_u');renderForm();}
  } else { renderForm(); }
  document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
};
</script>
